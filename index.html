<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Security Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
